name: Update upcoming events

on:
  schedule:
    # Run on the 1st and 15th of each month at 10:00 UTC
    - cron: "0 10 1 * *"
    - cron: "0 10 15 * *"
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write

jobs:
  fetch-events:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Archive past events
        run: python scripts/archive-events.py

      - name: Fetch upcoming events from Meetup
        run: python scripts/fetch-events.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/upcoming.json data/past-events.json
          if git diff --cached --quiet; then
            echo "No changes to events."
          else
            git commit -m "Update events data"
            git push
          fi
