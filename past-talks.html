<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Past Talks</title>
  <link rel="stylesheet" href="src/styles.css"/>
</head>
<body>
  <div class="rain" aria-hidden="true"></div>
  <header>
    <div class="container">
      <div class="brand">
        <h1>Cork|Sec</h1>
        <small>Learning • Sharing • Community</small>
      </div>
      <nav aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="past-talks.html">Past Talks</a>
        <a href="submit.html">Submit a Topic</a>
        <a href="https://www.meetup.com/corksec/" target="_blank" rel="noopener">Meetup</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="panel">
      <div id="talks"></div>
      <noscript>Please enable JavaScript to view the talks list.</noscript>
    </section>
  </main>

  <footer>
    <p>© <span id="year"></span> Cork|Sec</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const REPO = 'CorkSec/website-docstore';
    const BRANCH = 'main';
    const RAW_BASE = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;
    const API_URL = `https://api.github.com/repos/${REPO}/git/trees/${BRANCH}?recursive=1`;

    const container = document.getElementById('talks');
    container.innerHTML = '<p>Loading talks...</p>';

    // Fetch both data sources in parallel
    Promise.all([
      fetch(API_URL).then(r => r.ok ? r.json() : Promise.reject(r.status)),
      fetch('data/past-events.json').then(r => r.ok ? r.json() : [])
    ])
    .then(([docstoreData, pastEvents]) => {
      // Build docstore file groups keyed by YYYY-MM
      const docFiles = {};
      if (docstoreData && docstoreData.tree) {
        for (const item of docstoreData.tree) {
          if (item.type !== 'blob' || item.path.endsWith('.DS_Store') || !item.path.includes('/')) continue;
          const month = item.path.split('/')[0];
          if (!docFiles[month]) docFiles[month] = [];
          docFiles[month].push(item);
        }
      }

      // Build past-events groups keyed by YYYY-MM
      const eventsByMonth = {};
      for (const ev of pastEvents) {
        if (!ev.date) continue;
        const month = ev.date.slice(0, 7); // YYYY-MM
        if (!eventsByMonth[month]) eventsByMonth[month] = [];
        eventsByMonth[month].push(ev);
      }

      // Merge all month keys
      const allMonths = new Set([...Object.keys(docFiles), ...Object.keys(eventsByMonth)]);
      const months = [...allMonths].sort().reverse();

      if (months.length === 0) {
        container.innerHTML = '<p>No past talks available yet.</p>';
        return;
      }

      container.innerHTML = months.map(m => {
        let html = `<h2>${m}</h2>`;

        // Render event metadata (talks, speakers) from past-events.json
        const events = eventsByMonth[m] || [];
        for (const ev of events) {
          html += `<article class="talk">`;
          html += `<h3>${ev.title}</h3>`;
          const d = new Date(ev.date + 'T' + (ev.time || '00:00'));
          const dateStr = d.toLocaleDateString('en-IE', { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' });
          html += `<p>${dateStr}` + (ev.venue ? ` &mdash; ${ev.venue}` : '') + `</p>`;
          if (ev.talks && ev.talks.length) {
            html += '<ul style="margin:.4rem 0;padding-left:1.2rem">';
            for (const t of ev.talks) {
              html += `<li><strong>${t.title}</strong>` + (t.speaker ? ` &mdash; ${t.speaker}` : '') + `</li>`;
            }
            html += '</ul>';
          }
          if (ev.meetupUrl) {
            html += `<p><a href="${ev.meetupUrl}" target="_blank" rel="noopener">View on Meetup</a></p>`;
          }
          html += `</article>`;
        }

        // Render downloadable files from docstore
        const files = docFiles[m] || [];
        for (const f of files) {
          const fileName = f.path.split('/').pop();
          const ext = fileName.split('.').pop().toUpperCase();
          const label = fileName.replace(/\.[^.]+$/, '').replace(/_/g, ' ');
          const url = `${RAW_BASE}/${encodeURIComponent(f.path.split('/')[0])}/${encodeURIComponent(fileName)}`;
          html += `<article class="talk"><h3>${label}</h3>`;
          html += `<p><a href="${url}" target="_blank" rel="noopener">Download ${ext}</a></p></article>`;
        }

        return html;
      }).join('');
    })
    .catch(() => {
      container.innerHTML = '<p>Could not load talks.</p>';
    });
  </script>
</body>
</html>
